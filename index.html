<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Living Map v1.2 — Seven Frequencies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080e;
    --panel: #0f0f1a;
    --panel-2: #161625;
    --panel-3: #1e1e30;
    --gold: #c9a75c;
    --gold-dim: #8a7340;
    --gold-faint: #3d3420;
    --text: #ede9df;
    --text-dim: #8a8578;
    --text-faint: #55524a;
    --border: #2a2a3d;
    --border-dim: #1a1a2a;
    --shadow-red: #d44545;
    --shadow-red-dim: #8a3535;

    --mot: #e8533a;
    --hea: #4db882;
    --cha: #e8a020;
    --com: #4a7ee0;
    --pro: #9b6ed4;
    --see: #38b8c0;
    --mav: #d44e96;

    --dyn-relating: #4db882;
    --dyn-activating: #e8533a;
    --dyn-informing: #9b6ed4;
    --dyn-innovating: #38b8c0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(201, 167, 92, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(74, 126, 224, 0.03) 0%, transparent 50%),
      var(--bg);
  }
  .mono { font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); }

  /* ---------- Layout ---------- */
  .app {
    max-width: 1500px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-dim);
    flex-wrap: wrap;
    gap: 16px;
  }
  .brand h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 40px;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .brand h1 em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }
  .brand .sub { color: var(--text-dim); font-size: 14px; letter-spacing: 0.04em; }
  .brand .version { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--text-faint); margin-top: 4px; }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--gold-dim); color: var(--text); }
  .btn-ghost.active { border-color: var(--gold); color: var(--gold); }

  /* ---------- Saved Roster ---------- */
  .roster {
    margin-bottom: 24px;
    padding: 14px 16px;
    background: var(--panel);
    border: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .roster-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .roster-items { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: var(--gold-dim); }
  .chip.current { border-color: var(--gold); color: var(--gold); }
  .chip .x {
    color: var(--text-faint);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 0 2px;
    transition: color 0.2s;
  }
  .chip .x:hover { color: var(--shadow-red); }

  /* ---------- Map canvas ---------- */
  .body {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 40px;
    align-items: start;
  }
  .body.relational {
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 1100px) {
    .body, .body.relational { grid-template-columns: 1fr; }
  }

  .map-panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
    border: 1px solid var(--border-dim);
    padding: 24px 16px 32px;
    position: relative;
    min-height: 720px;
  }
  .map-panel.relational { min-height: 760px; }
  .map-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding: 0 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .map-title { font-size: 13px; letter-spacing: 0.18em; color: var(--text-dim); font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .map-toggles { display: flex; gap: 6px; align-items: center; }
  .toggle-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--gold-dim); }
  .toggle-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .toggle-btn.shadow-active { background: var(--shadow-red); color: var(--bg); border-color: var(--shadow-red); }

  /* SVG map styles */
  .map-svg { width: 100%; height: auto; display: block; }

  .freq-dot {
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .freq-dot:hover .dot-core { r: 17; }
  .freq-dot.selected .dot-core { r: 19; stroke-width: 2; }
  .freq-dot.bridge .dot-core { r: 20; }
  .freq-dot.bridge.selected .dot-core { r: 22; }

  .dot-core {
    r: 15;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dot-ring {
    fill: none;
    stroke-width: 1;
    opacity: 0.35;
    transition: all 0.3s;
  }
  .freq-dot:hover .dot-ring { opacity: 0.7; r: 26; }
  .freq-dot.selected .dot-ring { opacity: 0.9; r: 30; stroke-width: 1.5; }

  .dot-label {
    font-family: 'DM Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    fill: var(--text-dim);
    text-anchor: middle;
    transition: all 0.3s;
    pointer-events: none;
  }
  .freq-dot:hover .dot-label,
  .freq-dot.selected .dot-label { fill: var(--text); }

  .dot-score {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    fill: var(--text-faint);
    text-anchor: middle;
    pointer-events: none;
  }
  .freq-dot.selected .dot-score { fill: var(--gold); }

  .dot-rank {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    fill: var(--gold-dim);
    text-anchor: middle;
    pointer-events: none;
  }
  .freq-dot.selected .dot-rank { fill: var(--gold); }

  .triangle {
    fill: none;
    stroke: var(--border);
    stroke-width: 1;
    opacity: 0.35;
    transition: all 0.4s;
  }
  .triangle.dyn-overlay { opacity: 0.18; stroke-width: 2; }
  .bridge-line {
    stroke: var(--gold-dim);
    stroke-width: 1;
    stroke-dasharray: 2 4;
    opacity: 0.5;
  }
  .region-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    fill: var(--text-faint);
    text-anchor: middle;
  }
  .region-label-side {
    font-family: 'DM Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    fill: var(--text-faint);
  }
  .bridge-glow {
    fill: var(--gold);
    opacity: 0;
    animation: bridge-pulse 3s ease-in-out infinite;
  }
  @keyframes bridge-pulse {
    0%, 100% { opacity: 0; r: 22; }
    50% { opacity: 0.08; r: 40; }
  }

  /* Score-gap marker */
  .gap-marker {
    fill: none;
    stroke: var(--gold-dim);
    stroke-width: 1;
    opacity: 0.4;
  }
  .gap-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    fill: var(--text-faint);
    text-anchor: middle;
  }

  /* Shadow mode styling */
  .shadow-mode .freq-dot .dot-core { fill-opacity: 0.4; }
  .shadow-mode .freq-dot.selected .dot-core { fill-opacity: 1; }

  /* Relational connection lines */
  .rel-line {
    fill: none;
    stroke-width: 1.5;
    opacity: 0.5;
    transition: all 0.3s;
  }
  .rel-line.bridge-match { stroke-width: 2.5; opacity: 0.85; stroke-dasharray: none; }
  .rel-line.shared { stroke: var(--gold); opacity: 0.7; stroke-dasharray: 3 3; }

  /* Map controls */
  .map-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-dim);
    flex-wrap: wrap;
  }
  .map-controls button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .map-controls button:hover:not(:disabled) { border-color: var(--gold-dim); color: var(--text); }
  .map-controls button.primary { border-color: var(--gold); color: var(--gold); }
  .map-controls button.primary:hover:not(:disabled) { background: var(--gold); color: var(--bg); }
  .map-controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .walk-indicator {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    text-transform: uppercase;
    padding: 0 16px;
  }
  .walk-indicator .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }

  /* ---------- Detail panel ---------- */
  .detail-panel {
    position: sticky;
    top: 24px;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
  }
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-track { background: var(--panel); }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-empty {
    padding: 60px 40px;
    text-align: center;
    color: var(--text-faint);
    font-style: italic;
    font-size: 17px;
    line-height: 1.6;
  }
  .detail-empty .tip {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border-dim);
    font-style: normal;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .detail-card {
    background: var(--panel);
    border: 1px solid var(--border-dim);
    padding: 0;
    overflow: hidden;
  }
  .detail-hero {
    padding: 28px 28px 22px;
    border-bottom: 1px solid var(--border-dim);
    position: relative;
    overflow: hidden;
  }
  .detail-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background: radial-gradient(circle at 70% 30%, var(--hero-color, var(--gold)), transparent 70%);
    pointer-events: none;
  }
  .hero-position {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    padding: 4px 12px;
    margin-bottom: 14px;
  }
  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hero-shadow-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .hero-transmits {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .hero-transmits strong { color: var(--text); font-weight: 400; }
  .hero-dynamic {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    font-size: 9px;
    letter-spacing: 0.14em;
    background: rgba(201, 167, 92, 0.1);
    border: 1px solid var(--gold-faint);
    color: var(--gold-dim);
  }

  .detail-body { padding: 20px 28px 28px; }
  .detail-section { margin-bottom: 22px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-section h3 {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-dim);
  }
  .detail-section p {
    color: var(--text);
    font-size: 16px;
    line-height: 1.62;
  }
  .detail-section p + p { margin-top: 10px; }
  .detail-meta {
    color: var(--text-dim);
    font-style: italic;
    font-size: 14px;
    margin-top: 8px;
  }

  .position-note {
    font-style: italic;
    color: var(--text);
    border-left: 2px solid var(--gold);
    padding-left: 14px;
    font-size: 16px;
    line-height: 1.62;
  }

  .shadow-block {
    background: rgba(212, 69, 69, 0.04);
    border: 1px solid rgba(212, 69, 69, 0.15);
    padding: 14px 16px;
  }
  .shadow-block + .shadow-block { margin-top: 10px; }
  .shadow-block h4 {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #d46565;
    font-weight: 400;
    margin-bottom: 8px;
  }
  .shadow-block p { font-size: 15px; color: var(--text); line-height: 1.55; }
  .shadow-list { list-style: none; padding-left: 0; }
  .shadow-list li {
    padding: 6px 0 6px 20px;
    position: relative;
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
  }
  .shadow-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: #d46565;
    font-family: 'DM Mono', monospace;
  }

  .reflection {
    background: var(--panel-2);
    border: 1px solid var(--border-dim);
    padding: 16px 18px 16px 30px;
    font-style: italic;
    color: var(--text);
    font-size: 16px;
    line-height: 1.55;
    position: relative;
  }
  .reflection::before {
    content: '"';
    position: absolute;
    top: -4px;
    left: 10px;
    font-size: 36px;
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    line-height: 1;
  }

  .coach-notes textarea {
    width: 100%;
    min-height: 100px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .coach-notes textarea:focus { outline: none; border-color: var(--gold-dim); }
  .coach-notes .note-hint {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ---------- Setup screen ---------- */
  .setup {
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 32px;
    background: var(--panel);
    border: 1px solid var(--border-dim);
  }
  .setup h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .setup .setup-sub { color: var(--text-dim); margin-bottom: 24px; font-size: 15px; }
  .setup-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border-dim);
  }
  .setup-tabs button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .setup-tabs button.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .setup-field { margin-bottom: 14px; }
  .setup-field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .setup-field input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
  }
  .setup-field input[type="text"]:focus { outline: none; border-color: var(--gold-dim); }

  .score-grid {
    display: grid;
    grid-template-columns: 1fr 60px;
    gap: 8px 14px;
    align-items: center;
  }
  .score-row { display: contents; }
  .score-row .freq-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
  }
  .score-row .freq-label .mini-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-row input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: center;
  }
  .score-row input[type="number"]:focus { outline: none; border-color: var(--gold-dim); }

  .rank-list { display: flex; flex-direction: column; gap: 7px; }
  .rank-row { display: flex; align-items: center; gap: 12px; }
  .rank-row .rank-num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--gold);
    width: 28px;
  }
  .rank-row select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
  }
  .rank-row select:focus { outline: none; border-color: var(--gold-dim); }

  .setup-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 22px;
    border-top: 1px solid var(--border-dim);
    gap: 12px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--bg);
    border: none;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--text); }
  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 12px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--gold-dim); }

  .sample-hint { color: var(--text-faint); font-size: 13px; font-style: italic; }
  .sample-hint a { color: var(--gold-dim); cursor: pointer; text-decoration: underline; }
  .sample-hint a:hover { color: var(--gold); }

  /* client meta bar */
  .client-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: var(--panel-2);
    border: 1px solid var(--border-dim);
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
  }

const storage = {
  async get(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? { key, value: raw } : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch (e) { return null; }
  },
  async delete(key) {
    try {
      localStorage.removeItem(key);
      return { key, deleted: true };
    } catch (e) { return null; }
  },
  async list(prefix = '') {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix };
    } catch (e) { return { keys: [] }; }
  }
};

function rankFromScores(scores) {
  return Object.entries(scores).sort((a, b) => b[1] - a[1]).map(([id]) => id);

function scoresFromRank(rankArr) {
  const scores = {};
  rankArr.forEach((id, idx) => { scores[id] = 100 - (idx * 12); });
  FREQ_ORDER.forEach(id => { if (!(id in scores)) scores[id] = 0; });
  return scores;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);
}
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function loadSavedClients() {
  const { keys } = await storage.list(STORAGE_PREFIX + 'client:');
  const clients = [];
  for (const k of keys) {
    const r = await storage.get(k);
    if (r) try { clients.push(JSON.parse(r.value)); } catch (e) {}
  }
  clients.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  state.savedClients = clients;
}

async function saveClient(client) {
  const key = STORAGE_PREFIX + 'client:' + client.id;
  await storage.set(key, JSON.stringify(client));
  await loadSavedClients();
  flashSave();
}

async function deleteClient(id) {
  const key = STORAGE_PREFIX + 'client:' + id;

  await loadSavedClients();
}

  state.saveIndicator = Date.now();
  render();
  setTimeout(() => {
    if (Date.now() - state.saveIndicator >= 1400) {
      state.saveIndicator = null;
      render();
    }
  }, 1500);
}

const debouncedSaveCurrent = debounce(() => {
  if (state.clientA) saveClient(state.clientA);
}, 600);

  if (state.screen === 'setup') renderSetup();

  if (state.showInnerVoice) renderInnerVoiceOverlay();
  if (state.saveIndicator) renderSaveIndicator();
}

}

function attachSetupHandlers(relationalSetup, activeTab) {
  document.querySelectorAll('[data-setup-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.setupMode = btn.dataset.setupMode;
      render();
    });
  });

  document.querySelectorAll('[data-load-client]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.deleteClient) return;
      const c = state.savedClients.find(x => x.id === el.dataset.loadClient);
      if (c) {
        state.clientA = JSON.parse(JSON.stringify(c));
        state.screen = 'map';
        state.mode = 'solo';
        state.selectedPosition = null;
        state.shadowMode = false;
        state.walkActive = false;
        render();
      }
    });
  });

  document.querySelectorAll('[data-delete-client]').forEach(el => {
    el.addEventListener('click', async e => {
      e.stopPropagation();
      const id = el.dataset.deleteClient;
      const c = state.savedClients.find(x => x.id === id);
      if (c && confirm(`Delete "${c.name}"? This cannot be undone.`)) {
        await deleteClient(id);
        render();
      }
    });
  });

  if (relationalSetup) {
    const aSel = document.getElementById('rel-a-select');
    const bSel = document.getElementById('rel-b-select');
    if (aSel) aSel.addEventListener('change', () => {
      const c = state.savedClients.find(x => x.id === aSel.value);
      state.relA = c ? JSON.parse(JSON.stringify(c)) : null;
      render();
    });
    if (bSel) bSel.addEventListener('change', () => {
      const c = state.savedClients.find(x => x.id === bSel.value);
      state.relB = c ? JSON.parse(JSON.stringify(c)) : null;
      render();
    });
    const beginRel = document.getElementById('begin-relational');
    if (beginRel) beginRel.addEventListener('click', () => {
      if (!state.relA || !state.relB) { alert('Select two clients.'); return; }
      if (state.relA.id === state.relB.id) { alert('Select two different clients.'); return; }
      state.clientA = state.relA;
      state.clientB = state.relB;
      state.screen = 'relational';
      state.mode = 'relational';
      state.selectedPosition = null;
      state.shadowMode = false;
      render();
    });
    return;
  }

  // solo setup handlers
  document.querySelectorAll('.setup-tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      persistSetupDrafts();
      state.setupTab = btn.dataset.tab;
      render();
    });
  });

  const loadSampleEl = document.getElementById('load-sample');
  if (loadSampleEl) loadSampleEl.addEventListener('click', () => {
    state.draftName = SAMPLE_DATA.name;
    state.draftContext = SAMPLE_DATA.context;
    state.draftScores = { ...SAMPLE_DATA.scores };
    state.draftRank = rankFromScores(SAMPLE_DATA.scores);
    render();
  });

  const beginEl = document.getElementById('begin-session');
  if (beginEl) beginEl.addEventListener('click', beginSession);

  ['s-name', 's-context'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', persistSetupDrafts);
  });
}

function persistSetupDrafts() {
  const nameEl = document.getElementById('s-name');
  const ctxEl = document.getElementById('s-context');
  if (nameEl) state.draftName = nameEl.value;
  if (ctxEl) state.draftContext = ctxEl.value;
  const scoreInputs = document.querySelectorAll('.score-input');
  if (scoreInputs.length) {
    state.draftScores = state.draftScores || {};
    scoreInputs.forEach(el => {
      const v = el.value.trim();
      state.draftScores[el.dataset.freq] = v === '' ? null : Math.max(0, Math.min(100, parseInt(v) || 0));
    });
  }
  const rankSelects = document.querySelectorAll('.rank-select');
  if (rankSelects.length) {
    state.draftRank = [];
    rankSelects.forEach(el => {
      state.draftRank[parseInt(el.dataset.rank)] = el.value || null;
    });
  }
}

function beginSession() {
  persistSetupDrafts();
  const name = (state.draftName || '').trim() || 'Client';
  const context = (state.draftContext || '').trim();
  const tab = state.setupTab || 'scores';

  let scores;
  if (tab === 'scores') {
    scores = {};
    FREQ_ORDER.forEach(id => {
      scores[id] = (state.draftScores && state.draftScores[id] != null) ? state.draftScores[id] : 0;
    });
    if (Object.values(scores).reduce((a, b) => a + b, 0) === 0) {
      alert('Please enter scores for at least some frequencies, or load the sample.');
      return;
    }
  } else {
    const rank = (state.draftRank || []).filter(Boolean);
    const uniq = new Set(rank);
    if (uniq.size !== 7) {
      alert('Please select all seven frequencies in ranked order, with no duplicates.');
      return;
    }
    scores = scoresFromRank(rank);
  }

  const rank = rankFromScores(scores);
  const id = slugify(name) + '-' + Date.now().toString(36);
  state.clientA = {
    id,
    name,
    context,
    scores,
    rank,
    notes: {},
    createdAt: Date.now()
  };
  saveClient(state.clientA);
  state.screen = 'map';
  state.mode = 'solo';
  state.selectedPosition = null;
  state.shadowMode = false;
  state.walkActive = false;
  render();
}

function renderDynamicsLegend(c) {
  const top3 = c.rank.slice(0, 3).map(id => FREQUENCIES[id].dynamic);
  const bottom3 = c.rank.slice(4, 7).map(id => FREQUENCIES[id].dynamic);
  const bridge = FREQUENCIES[c.rank[3]].dynamic;
  const counts = dyn => dyn.reduce((a, d) => (a[d] = (a[d]||0)+1, a), {});
  const topCounts = counts(top3);
  const botCounts = counts(bottom3);
  const fmt = o => Object.entries(o).map(([k,v]) => `<span style="color:${DYNAMIC_META[k].color}">${k}×${v}</span>`).join(' · ');
  return `
    <div style="margin:16px 10px 0; padding:12px 14px; background:var(--panel-2); border:1px solid var(--border-dim); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; color:var(--text-dim)">
      <div>PRIMARY: ${fmt(topCounts)}</div>
      <div style="margin-top:4px">BRIDGE: <span style="color:${DYNAMIC_META[bridge].color}">${bridge}</span></div>
      <div style="margin-top:4px">SECONDARY: ${fmt(botCounts)}</div>

}

function renderMapSVG(c, sideLabel) {
  const { rank, scores } = c;
  const shadow = state.shadowMode;
  const showGaps = state.showGaps;
  const showDyn = state.showDynamics;
  const selPos = (state.mode === 'solo' && state.selectedPosition) ||
                 (state.mode === 'relational' && state.selectedPosition?.client === sideLabel ? state.selectedPosition.pos : null);

  // dynamic coloring of the triangles
  const primDyns = [...new Set(rank.slice(0,3).map(id => FREQUENCIES[id].dynamic))];
  const secDyns  = [...new Set(rank.slice(4,7).map(id => FREQUENCIES[id].dynamic))];
  const primStroke = showDyn && primDyns.length === 1 ? DYNAMIC_META[primDyns[0]].color : 'var(--border)';
  const secStroke  = showDyn && secDyns.length  === 1 ? DYNAMIC_META[secDyns[0]].color  : 'var(--border)';

  return `
    <svg class="map-svg ${shadow ? 'shadow-mode' : ''}" viewBox="0 0 ${MAP_W} ${MAP_H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        ${Object.values(FREQUENCIES).map(f => `
          <radialGradient id="grad-${f.id}-${sideLabel}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="${f.color}" stop-opacity="1"/>
            <stop offset="70%" stop-color="${f.color}" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="${f.color}" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow-${f.id}-${sideLabel}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        `).join('')}
      </defs>

      <text x="${MAP_W/2}" y="30" class="region-label" style="letter-spacing:0.3em">△ &nbsp; PRIMARY TRIAD &nbsp; △</text>
      <text x="${MAP_W/2}" y="${MAP_H - 10}" class="region-label" style="letter-spacing:0.3em">▽ &nbsp; SECONDARY TRIAD &nbsp; ▽</text>
      <text x="40" y="${POSITIONS[4].y + 4}" class="region-label-side">BRIDGE</text>

      <polygon class="triangle ${showDyn ? 'dyn-overlay' : ''}"
        points="${POSITIONS[1].x},${POSITIONS[1].y} ${POSITIONS[2].x},${POSITIONS[2].y} ${POSITIONS[3].x},${POSITIONS[3].y}"
        stroke="${primStroke}"/>

      <polygon class="triangle ${showDyn ? 'dyn-overlay' : ''}"
        points="${POSITIONS[7].x},${POSITIONS[7].y} ${POSITIONS[5].x},${POSITIONS[5].y} ${POSITIONS[6].x},${POSITIONS[6].y}"
        stroke="${secStroke}"/>

      <line class="bridge-line"
        x1="${POSITIONS[1].x}" y1="${POSITIONS[2].y + 70}"
        x2="${POSITIONS[7].x}" y2="${POSITIONS[5].y - 70}" />

      <circle class="bridge-glow" cx="${POSITIONS[4].x}" cy="${POSITIONS[4].y}" r="22"/>

      ${showGaps ? renderGapMarkers(c) : ''}

      ${[1,2,3,4,5,6,7].map(pos => {
        const freqId = rank[pos - 1];
        const f = FREQUENCIES[freqId];
        const score = scores[freqId];
        const p = POSITIONS[pos];
        const isSelected = selPos === pos;
        const isBridge = pos === 4;
        return `
          <g class="freq-dot ${isSelected ? 'selected' : ''} ${isBridge ? 'bridge' : ''}"
             data-position="${pos}"
             data-client="${sideLabel}"
             transform="translate(${p.x},${p.y})">
            <circle class="dot-ring" r="${isBridge ? 26 : 22}" stroke="${f.color}" />
            <circle class="dot-core" fill="url(#grad-${f.id}-${sideLabel})" stroke="${f.color}" filter="url(#glow-${f.id}-${sideLabel})"/>
            <text class="dot-rank" y="-36">${isBridge ? 'bridge' : '#' + pos}</text>
            <text class="dot-label" y="42">${f.name}</text>
            <text class="dot-score" y="55">${score}</text>
            ${shadow && isSelected ? `<text class="dot-label" y="70" style="fill:#d46565;font-style:italic;font-family:Cormorant Garamond, serif;font-size:12px;letter-spacing:0.1em">${f.shadow}</text>` : ''}
          </g>
        `;
      }).join('')}
    </svg>
  `;
}

/* Draw small markers indicating the score gap between adjacent-ranked positions.
   Gaps are shown as arcs on the right side of the map with numeric deltas. */
function renderGapMarkers(c) {
  const { rank, scores } = c;
  const markers = [];
  for (let i = 0; i < 6; i++) {
    const f1 = rank[i], f2 = rank[i+1];
    const gap = scores[f1] - scores[f2];
    const p1 = POSITIONS[i+1], p2 = POSITIONS[i+2];
    const mx = (p1.x + p2.x) / 2;
    const my = (p1.y + p2.y) / 2;
    // offset to the right edge
    const ox = MAP_W - 30;
    const oy = my;
    // intensity of gap
    const opacity = Math.min(0.9, 0.25 + gap / 60);
    markers.push(`
      <line class="gap-marker" x1="${ox - 6}" y1="${oy}" x2="${ox + 6}" y2="${oy}" stroke-width="${1 + gap/20}" opacity="${opacity}"/>
      <text class="gap-label" x="${ox}" y="${oy - 6}">${gap > 0 ? '+' : ''}${gap}</text>
    `);
  }
  return markers.join('');
}

  return `
    <div class="detail-card fade-in" style="--hero-color:${f.color}">
      <div class="detail-hero" style="border-top: 3px solid ${f.color}">
        <div class="hero-position">${posMeta.label} · ${posMeta.region} · Score ${score}</div>
        <div class="hero-name" style="color:${f.color}">${f.name}</div>
        <div class="hero-shadow-name">shadow: ${f.shadow}</div>
        <div class="hero-transmits">
          transmits <strong>${f.basic}</strong> &nbsp;·&nbsp; meets <strong>${f.high}</strong>
          <span class="hero-dynamic" style="color:${DYNAMIC_META[f.dynamic].color};border-color:${DYNAMIC_META[f.dynamic].color}33;background:${DYNAMIC_META[f.dynamic].color}11">${f.dynamic}</span>
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <h3>What this frequency is</h3>
          <p>${f.body}</p>
          <p class="detail-meta">Themes: ${f.themes} &nbsp;·&nbsp; Drive: "${f.drive}"</p>
        </div>

        <div class="detail-section">
          <h3>What it means at this position</h3>
          <p class="position-note">${posMeta.note}</p>
        </div>

        ${shadow ? `
          <div class="detail-section">
            <h3>Shadow expression</h3>
            <div class="shadow-block">
              <h4>${f.shadow}</h4>
              <p>${f.shadowBody}</p>
            </div>
            <div class="shadow-block" style="margin-top:10px">
              <h4>Are you in your shadow?</h4>
              <ul class="shadow-list">
                ${f.shadowQuestions.map(q => `<li>${q}</li>`).join('')}
              </ul>
            </div>
            <div class="shadow-block" style="margin-top:10px">
              <h4>Leaving the shadow</h4>
              <p>${f.shadowExit}</p>
            </div>
          </div>
        ` : ''}

        <div class="detail-section">
          <h3>Reflection</h3>
          <div class="reflection">${posMeta.reflection}</div>
        </div>

        <div class="detail-section coach-notes">
          <h3>Coach Notes — Position ${pos}</h3>
          <textarea id="note-input" data-position="${pos}" placeholder="What did the client say when they landed here? What did you notice?">${escapeHtml(note)}</textarea>
          <div class="note-hint">Auto-saves as you type · Appears in PDF export</div>
        </div>
      </div>
    </div>
  `;
}

/* -----------------------------------------------------------------------------
   RELATIONAL SCREEN
   ----------------------------------------------------------------------------- */

function renderRelational() {
  const a = state.clientA, b = state.clientB;
  const bridgeReading = computeBridgeReading(a, b);

  root.innerHTML = `
    <div class="app fade-in">
      <header class="top">
        <div class="brand">
          <h1>The Living <em>Map</em></h1>
          <div class="sub">Seven Frequencies — Interactive Coaching Instrument</div>
          <div class="version">V 1.2 · RELATIONAL</div>
        </div>
        <div class="header-actions">
          <button class="btn-ghost" data-action="back-to-setup">← Choose Different Pair</button>
          <button class="btn-ghost" data-action="to-solo-a">Solo: ${escapeHtml(a.name)}</button>
          <button class="btn-ghost" data-action="to-solo-b">Solo: ${escapeHtml(b.name)}</button>
          <button class="btn-ghost" data-action="print-pdf">Print / PDF</button>
        </div>
      </header>

      <div class="map-header" style="padding: 0 0 12px; border-bottom: 1px solid var(--border-dim); margin-bottom: 16px">
        <div class="map-title">Relational Map · Bridge-Into-Primary Reading</div>
        <div class="map-toggles">
          <button class="toggle-btn ${state.shadowMode ? 'shadow-active' : ''}" data-toggle="shadow">Shadows</button>
        </div>
      </div>

      <div class="body relational">
        <div class="map-panel relational">
          <div class="rel-header">
            <div class="name">${escapeHtml(a.name)}</div>
            <div class="meta">Primary: ${FREQUENCIES[a.rank[0]].name} · Bridge: ${FREQUENCIES[a.rank[3]].name}</div>
          </div>
          ${renderMapSVG(a, 'A')}
        </div>
        <div class="map-panel relational">
          <div class="rel-header">
            <div class="name">${escapeHtml(b.name)}</div>
            <div class="meta">Primary: ${FREQUENCIES[b.rank[0]].name} · Bridge: ${FREQUENCIES[b.rank[3]].name}</div>
          </div>
          ${renderMapSVG(b, 'B')}
        </div>
      </div>

      ${renderBridgeReading(a, b, bridgeReading)}
    </div>
  `;

  attachMapHandlers();
}

function computeBridgeReading(a, b) {
  const aBridge = a.rank[3];
  const bBridge = b.rank[3];
  const aPrimary = a.rank.slice(0, 3);
  const bPrimary = b.rank.slice(0, 3);
  const aPrimaryOne = a.rank[0];
  const bPrimaryOne = b.rank[0];

  const reading = {
    aBridgeInBPrimary: bPrimary.includes(aBridge) ? bPrimary.indexOf(aBridge) + 1 : null,
    bBridgeInAPrimary: aPrimary.includes(bBridge) ? aPrimary.indexOf(bBridge) + 1 : null,
    bridgeMatch: aBridge === bBridge,
    sharedPrimaries: aPrimary.filter(f => bPrimary.includes(f)),
    primaryMatch: aPrimaryOne === bPrimaryOne,
    aBridgeFreq: FREQUENCIES[aBridge],
    bBridgeFreq: FREQUENCIES[bBridge]
  };
  return reading;
}

function renderBridgeReading(a, b, r) {
  const lines = [];

  if (r.bridgeMatch) {
    lines.push({
      arrow: '◉',
      text: `<strong>Shared bridge.</strong> Both of you carry ${FREQUENCIES[a.rank[3]].name} as your bridge — the same translation layer. You reach others through the same door, which means you likely recognize each other\u2019s moves when navigating outward, even when your primaries differ.`
    });
  }

  if (r.primaryMatch) {
    lines.push({
      arrow: '▲',
      text: `<strong>Mirror primary.</strong> Both carry ${FREQUENCIES[a.rank[0]].name} as primary #1. This is the clearest overlap — and also where the frictions in this pairing will feel most personal. Two of the same voice in a room need to stay awake to who is transmitting and who is listening.`
    });
  }

  if (r.aBridgeInBPrimary) {
    lines.push({
      arrow: '→',
      text: `<strong>${escapeHtml(a.name)}\u2019s bridge (${r.aBridgeFreq.name}) lands in ${escapeHtml(b.name)}\u2019s primary triad</strong> at position #${r.aBridgeInBPrimary}. When ${escapeHtml(a.name)} reaches out, they are speaking natively to something core in ${escapeHtml(b.name)}. The translation is short.`
    });
  } else {
    lines.push({
      arrow: '—',
      text: `<strong>${escapeHtml(a.name)}\u2019s bridge (${r.aBridgeFreq.name}) does not land in ${escapeHtml(b.name)}\u2019s primary triad.</strong> The easiest path inward is not obvious. ${escapeHtml(a.name)} may need to borrow from their secondary triad when trying to meet ${escapeHtml(b.name)} where they live.`
    });
  }

  if (r.bBridgeInAPrimary) {
    lines.push({
      arrow: '←',
      text: `<strong>${escapeHtml(b.name)}\u2019s bridge (${r.bBridgeFreq.name}) lands in ${escapeHtml(a.name)}\u2019s primary triad</strong> at position #${r.bBridgeInAPrimary}. When ${escapeHtml(b.name)} reaches out, they are speaking natively to something core in ${escapeHtml(a.name)}.`
    });
  } else {
    lines.push({
      arrow: '—',
      text: `<strong>${escapeHtml(b.name)}\u2019s bridge (${r.bBridgeFreq.name}) does not land in ${escapeHtml(a.name)}\u2019s primary triad.</strong> ${escapeHtml(b.name)} may feel the need to stretch when initiating connection.`
    });
  }

  if (r.sharedPrimaries.length > 0) {
    const names = r.sharedPrimaries.map(id => FREQUENCIES[id].name).join(', ');
    lines.push({
      arrow: '◈',
      text: `<strong>Shared primary frequencies:</strong> ${names}. You operate from common ground in these carriers — this is where collaboration is most effortless and where blind spots are most likely to be mutual.`
    });
  }

  return `
    <div class="bridge-reading">
      <h3>What the bridges say</h3>
      ${lines.map(l => `
        <div class="rl-row">
          <div class="rl-arrow">${l.arrow}</div>
          <div class="rl-text">${l.text}</div>
        </div>
      `).join('')}
      <div class="rl-row" style="border-top: 1px solid var(--gold-faint); padding-top: 16px; margin-top: 8px">
        <div class="rl-arrow">?</div>
        <div class="rl-text" style="font-style: italic; color: var(--text-dim)">
          Reflection: When this pair is at its best together, which of the readings above is most alive? When this pair is stuck, which one is the unspoken obstacle?
        </div>
      </div>
    </div>
  `;
}

/* -----------------------------------------------------------------------------
   MAP HANDLERS (shared solo + relational)
   ----------------------------------------------------------------------------- */

function attachMapHandlers() {
  // Dots
  document.querySelectorAll('.freq-dot').forEach(el => {
    el.addEventListener('click', () => {
      const pos = parseInt(el.dataset.position);
      const client = el.dataset.client;
      if (state.mode === 'relational') {
        state.selectedPosition = { client, pos };
      } else {
        state.selectedPosition = pos;
      }
      state.walkActive = false;
      render();
    });
  });

  // Toggles
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const t = el.dataset.toggle;
      if (t === 'shadow') state.shadowMode = !state.shadowMode;
      if (t === 'gaps') state.showGaps = !state.showGaps;
      if (t === 'dynamics') state.showDynamics = !state.showDynamics;
      render();
    });
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => handleAction(el.dataset.action));
  });

  // Coach notes
  const noteInput = document.getElementById('note-input');
  if (noteInput) {
    noteInput.addEventListener('input', e => {
      const pos = parseInt(e.target.dataset.position);
      const client = state.mode === 'relational'
        ? (state.selectedPosition?.client === 'B' ? state.clientB : state.clientA)
        : state.clientA;
      if (!client.notes) client.notes = {};
      client.notes[pos] = e.target.value;
      debouncedSaveCurrent();
    });
  }
}

function handleAction(action) {
  switch (action) {
    case 'new':
      if (confirm('Start a new session? Current map will be cleared from view (saved clients remain).')) {
        state.screen = 'setup';
        state.clientA = null;
        state.clientB = null;
        state.selectedPosition = null;
        state.shadowMode = false;
        state.walkActive = false;
        state.draftName = '';
        state.draftContext = '';
        state.draftScores = {};
        state.draftRank = [];
        render();
      }
      break;
    case 'to-relational':
      state.setupMode = 'relational';
      state.screen = 'setup';
      render();
      break;
    case 'to-solo-a':
      state.clientA = state.clientA;
      state.clientB = null;
      state.screen = 'map';
      state.mode = 'solo';
      state.selectedPosition = null;
      render();
      break;
    case 'to-solo-b':
      state.clientA = state.clientB;
      state.clientB = null;
      state.screen = 'map';
      state.mode = 'solo';
      state.selectedPosition = null;
      render();
      break;
    case 'back-to-setup':
      state.screen = 'setup';
      state.setupMode = 'relational';
      render();
      break;
    case 'walk-start':
      state.walkActive = true;
      state.walkStep = 0;
      state.selectedPosition = 1;
      render();
      break;
    case 'walk-next':
      if (state.walkStep < 6) {
        state.walkStep++;
        state.selectedPosition = state.walkStep + 1;
        render();
      }
      break;
    case 'walk-prev':
      if (state.walkStep > 0) {
        state.walkStep--;
        state.selectedPosition = state.walkStep + 1;
        render();
      }
      break;
    case 'walk-end':
      state.walkActive = false;
      render();
      break;
    case 'show-inner-voice':
      state.showInnerVoice = true;
      render();
      break;
    case 'export-json':
      exportJSON();
      break;
    case 'print-pdf':
      window.print();
      break;
  }
}

/* -----------------------------------------------------------------------------
   INNER VOICE OVERLAY
   ----------------------------------------------------------------------------- */

function renderInnerVoiceOverlay() {
  const div = document.createElement('div');
  div.className = 'inner-voice-modal';
  div.innerHTML = `
    <div class="inner-voice-content">
      <button class="iv-close" id="iv-close">×</button>
      <h2>Navigating Your Inner Voice</h2>
      <div class="iv-sub">${INNER_VOICE.intro}</div>
      ${INNER_VOICE.practices.map(p => `
        <div class="iv-practice">
          <h3>${p.title}</h3>
          <p>${p.body}</p>
        </div>
      `).join('')}
      <div class="iv-checkins">
        <h3>Three Check-Ins</h3>
        <ol>
          ${INNER_VOICE.checkins.map(q => `<li>${q}</li>`).join('')}
        </ol>
      </div>
    </div>
  `;
  document.body.appendChild(div);
  document.getElementById('iv-close').addEventListener('click', () => {
    state.showInnerVoice = false;
    render();
  });
  div.addEventListener('click', e => {
    if (e.target === div) {
      state.showInnerVoice = false;
      render();
    }
  });
}

/* -----------------------------------------------------------------------------
   JSON EXPORT (for future Team Diagnostic handoff)
   ----------------------------------------------------------------------------- */

function exportJSON() {
  const c = state.clientA;
  const payload = {
    tool: 'living-map',
    version: '1.2',
    exportedAt: new Date().toISOString(),
    client: {
      name: c.name,
      context: c.context,
      scores: c.scores,
      rank: c.rank,
      primary: FREQUENCIES[c.rank[0]].name,
      bridge: FREQUENCIES[c.rank[3]].name,
      shadow: FREQUENCIES[c.rank[0]].shadow,
      notes: c.notes || {}
    }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = slugify(c.name) + '-living-map.json';
  a.click();
  URL.revokeObjectURL(url);
}

/* -----------------------------------------------------------------------------
   BOOT
   ----------------------------------------------------------------------------- */

(async function boot() {
  await loadSavedClients();
  render();
})();
</script>
